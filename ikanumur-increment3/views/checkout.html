<!DOCTYPE html>
<html lang="en">
<head>
    <script src="../static/script.js" defer></script>

    <meta charset="UTF-8">
    <meta name="author" content="Ika">
    <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
    <meta name="description" content="MonoMuse website redesign project">
    <title>MonoMuse - Checkout</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../static/style.css">
</head>
<body onload="addYear()">

<header>
    <img id="logo" src="../static/monomuselogo.png" alt="MonoMuse Museum Logo">
    <nav>
        <a href="../index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="exhibitions.html">Exhibitions</a>
        <a href="tickets.html">Tickets</a>
        <a id="navselected" href="checkout.html">Checkout</a>
    </nav>
</header>

<div class="main">
    <h2>Checkout</h2>

    <form>
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>

        <label for="ticketType">Ticket Type:</label>
        <select id="ticketType" name="ticketType" required>
            <option value="general">General</option>
            <option value="student">Student</option>
            <option value="member">Member</option>
        </select>

        <label for="quantity">Ticket Quantity:</label>
        <input type="number" id="quantity" name="quantity" min="1" required>

        <button type="submit" class="submit-btn">Submit</button>
    </form>
</div>

<footer>
    <p id="copyYear"></p>
</footer>

</body>
</html>
